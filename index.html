<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Traffic — top-down city sim</title>
<style>
  :root{ --ink:#e8edf2; --muted:#8a93a0; --line:rgba(255,255,255,0.10);
    --panel:rgba(16,19,24,0.74); --go:#37d67a; --stop:#ff5a5a; --amber:#ffc24b; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0c10;overflow:hidden;
    font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;color:var(--ink)}
  #c{display:block;position:fixed;inset:0;cursor:crosshair;touch-action:none}
  .hud{position:fixed;top:14px;left:14px;z-index:5;background:var(--panel);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line);
    border-radius:14px;padding:13px 16px 15px;width:236px;box-shadow:0 10px 30px rgba(0,0,0,.4);user-select:none;
    transition:opacity .18s,transform .18s}
  .hud.hidden{opacity:0;transform:translateX(-12px) scale(.98);pointer-events:none}
  .hud h1{font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin:0 0 2px;font-weight:700}
  .hud .sub{font-size:10.5px;letter-spacing:.05em;color:var(--muted);margin-bottom:11px;line-height:1.5}
  .hud .sub b{color:var(--stop);font-weight:700}
  .row{display:flex;gap:8px;margin-top:8px}
  button{flex:1;appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);
    color:var(--ink);font:inherit;font-size:11px;letter-spacing:.03em;padding:8px 6px;border-radius:9px;cursor:pointer;
    transition:background .15s,border-color .15s,transform .05s}
  button:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.22)}
  button:active{transform:translateY(1px)}
  .field{margin-top:11px}
  .field label{display:flex;justify-content:space-between;font-size:10.5px;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}
  .field label span{color:var(--ink)}
  input[type=range]{width:100%;accent-color:var(--amber);height:18px;cursor:pointer}
  .stat{margin-top:12px;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted)}
  .stat b{color:var(--ink);font-weight:700}
  #toggle{position:fixed;top:14px;left:14px;z-index:6;width:38px;height:38px;display:none;
    align-items:center;justify-content:center;border-radius:11px;background:var(--panel);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line);
    color:var(--ink);font-size:16px;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .panel-x{position:absolute;top:11px;right:12px;width:auto;flex:none;padding:2px 7px;font-size:13px;background:transparent;border:none;color:var(--muted)}
  .panel-x:hover{color:var(--ink);background:transparent;border:none}
  .legend{position:fixed;bottom:12px;left:14px;z-index:5;display:flex;gap:13px;flex-wrap:wrap;font-size:10px;
    letter-spacing:.05em;color:var(--muted);background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:10px;padding:7px 11px;max-width:66vw}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  @media (max-width:640px){ .hud{width:auto;left:10px;right:10px;top:10px} .legend{display:none} }
  /* ---- car info popup ---- */
  #carPopup{position:fixed;z-index:20;pointer-events:auto;
    background:rgba(14,18,26,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.13);border-radius:14px;padding:14px 18px 16px;
    min-width:210px;box-shadow:0 14px 40px rgba(0,0,0,.55);
    font-size:11.5px;letter-spacing:.03em;color:var(--ink);
    transition:opacity .18s,transform .18s;opacity:0;transform:scale(.94);pointer-events:none}
  #carPopup.visible{opacity:1;transform:scale(1);pointer-events:auto}
  #carPopup h2{margin:0 0 10px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}
  #carPopup .cp-row{display:flex;justify-content:space-between;gap:16px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
  #carPopup .cp-row:last-child{border-bottom:none}
  #carPopup .cp-label{color:var(--muted)}
  #carPopup .cp-val{color:var(--ink);font-weight:700;text-align:right}
  #carPopup .cp-reason{margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,0.08);
    color:var(--amber);font-size:11px;line-height:1.5}
  #carPopup .cp-close{position:absolute;top:9px;right:11px;background:none;border:none;color:var(--muted);
    font-size:14px;cursor:pointer;padding:2px 5px;line-height:1}
  #carPopup .cp-close:hover{color:var(--ink)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="toggle" title="Show panel (H)">&#9776;</button>
<div class="hud" id="hud">
  <button class="panel-x" id="hide" title="Hide panel (H)">&#10005;</button>
  <h1>City Dispatch</h1>
  <div class="sub">Tap a car for info. Tap an intersection to cycle control. Crashes auto-clear. Police pull cars over (<b>amber</b>).</div>
  <div class="row"><button id="pause">Pause</button><button id="regen">New map</button></div>
  <div class="row"><button id="revive">Revive all</button></div>
  <div class="field"><label>Traffic <span id="countLbl">60</span></label><input id="count" type="range" min="10" max="180" value="60"></div>
  <div class="field"><label>Road density <span id="roadsLbl">60%</span></label><input id="roads" type="range" min="15" max="95" value="60"></div>
  <div class="field"><label>Roadblocks <span id="blocksLbl">3</span></label><input id="blocks" type="range" min="0" max="14" value="3"></div>
  <div class="field"><label>Scenery <span id="sceneLbl">60%</span></label><input id="scene" type="range" min="0" max="100" value="60"></div>
  <div class="stat"><span>moving / stalled</span><span><b id="moving">0</b> / <b id="dead" style="color:var(--stop)">0</b></span></div>
  <div class="stat" style="margin-top:6px;padding-top:8px"><span>time of day</span><span><b id="tod">day</b></span></div>
</div>
<div id="carPopup">
  <button class="cp-close" id="cpClose">&#10005;</button>
  <h2 id="cpTitle">Vehicle Info</h2>
  <div class="cp-row"><span class="cp-label">Distance</span><span class="cp-val" id="cpDist">—</span></div>
  <div class="cp-row"><span class="cp-label">Avg speed</span><span class="cp-val" id="cpAvg">—</span></div>
  <div class="cp-row"><span class="cp-label">Max speed</span><span class="cp-val" id="cpMax">—</span></div>
  <div class="cp-row"><span class="cp-label">Current speed</span><span class="cp-val" id="cpCur">—</span></div>
  <div class="cp-reason" id="cpReason" style="display:none"></div>
</div>
  <span><span class="dot" style="background:var(--go)"></span>green</span>
  <span><span class="dot" style="background:var(--stop)"></span>stop</span>
  <span><span class="dot" style="background:#eef2f7"></span>car</span>
  <span><span class="dot" style="background:#3b6bff"></span>police</span>
  <span><span class="dot" style="background:#ffc24b"></span>pulled over</span>
  <span><span class="dot" style="background:#ff4d4d"></span>disabled</span>
</div>

<script>
"use strict";
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');

// --- Geometry/timing constants (pixels & seconds) ---
const LW=12, CAR_L=17, CAR_W=9, STOPGAP=5, EXIT_PAD=3, DECISION_DIST=85;  // lane width, car size, stop gap, lane-change pad, how far out a car decides its move
const G=4.6, R=1.3, Yp=1.5, CYCLE=2*(G+Yp+R), DAY_LEN=82;                 // base green/all-red/yellow durations; full day length
const ACC=78, DEC=98, S0=7, T_HW=0.7, TURN_SPEED=42, PASS_GAP=58;          // IDM accel/decel, min gap, headway time, turn speed, overtake gap
const CRASH_CLEAR=6, CRASH_GRACE=2.2, IMPATIENCE=5;                         // crash clear time, post-revive grace, seconds before a waiting car forces through
const MING=2.5, MAXG=8, BUS_L=25;                                          // signal min/(legacy)max green, bus length
const CAR_COLORS=[[233,236,242],[223,228,237],[214,219,228],               // car palette: whites...
  [238,118,170],[230,86,150],                                              // ...pinks...
  [82,142,228],[64,108,214],                                               // ...blues...
  [82,190,120],[64,170,104],                                               // ...greens...
  [240,196,84],[226,128,70],[96,196,196]];                                 // ...yellow, orange, teal

let W,H,dpr;
let hys=[], vxs=[], xmin,xmax,ymin,ymax;
let hSeg={}, vSeg={};
let lanes=[], laneMap=new Map(), roadCfg=new Map(), intersections=new Map();
let cars=[], barriers=[], bars=[], sceneCells=[], nightWindows=[];
let graphNbr=new Map(), routableKeys=[]; let routing=true;
let bg=document.createElement('canvas'), bgx=bg.getContext('2d');
let targetCount=60, roadKeepProb=0.60, roadblockTarget=3, sceneryLevel=60;
let paused=false, lastT=performance.now(), simClock=0;
let deadlockTimer=0;   // accumulates to 1s; gates the rare gridlock-breaker check
let holderHighlight=[];  // [{car, until}] — cars to ring-highlight after ⓘ panel is open
const openInfoPanels=new Set(); // intersections whose holder-info panel is currently shown

const rand=(a,b)=>a+Math.random()*(b-a);
const ri=n=>Math.floor(Math.random()*n);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const getCfg=(axis,center)=>roadCfg.get(axis+'_'+center);

/* ---- map ---- */
function genPositions(lo,hi){ const pos=[lo]; let p=lo;
  while(true){ p+=rand(100,162); if(p>hi-82) break; pos.push(Math.round(p)); }
  pos.push(hi); return pos; }
/* Randomly drop interior road lines, keeping at least `keep` of them. */
function dropInterior(arr,keep){
  if(arr.length<=2) return arr.slice();
  const out=[arr[0]]; let kept=0;
  for(let i=1;i<arr.length-1;i++){ if(Math.random()<keep){ out.push(arr[i]); kept++; } }
  if(kept===0&&arr.length>2) out.push(arr[1+ri(arr.length-2)]);
  out.push(arr[arr.length-1]); out.sort((a,b)=>a-b); return out;
}
/* Build a road-configuration record (axis, center, lane count, half-width, dirs). */
function makeRoadCfg(axis,center){
  let oneway=false,dirs,m,owDir=null,n=null;
  if(false){ oneway=true; owDir=Math.random()<0.5?1:-1; n=Math.random()<0.55?1:2; dirs=[owDir]; }
  else { dirs=[1,-1]; m=Math.random()<0.55?2:1; }
  const totalLanes=oneway?n:2*m;
  return {axis,center,oneway,owDir,dirs,dirsSet:new Set(dirs),lanesPerDir:oneway?n:m,
    half:totalLanes/2*LW,totalLanes, lanesFor(d){ return this.dirsSet.has(d)?this.lanesPerDir:0; }};
}
/* Count how many road arms (N/E/S/W) are active at grid cell (i,j). */
function armCountAt(i,j,hS,vS){ const X=vxs[i],Y=hys[j]; let n=0;
  if(i<vxs.length-1&&hS[Y][i])n++; if(i>0&&hS[Y][i-1])n++;
  if(j<hys.length-1&&vS[X][j])n++; if(j>0&&vS[X][j-1])n++; return n; }
/* Flood-fill the active segment graph to find the largest connected road network. */
function activeConnected(hS,vS){
  const Wn=vxs.length,Hn=hys.length, idx=(i,j)=>i*Hn+j, isAct=new Array(Wn*Hn).fill(false); let active=0,first=-1;
  for(let i=0;i<Wn;i++)for(let j=0;j<Hn;j++){ if(armCountAt(i,j,hS,vS)>=1){ isAct[idx(i,j)]=true; active++; if(first<0)first=idx(i,j); } }
  if(active===0) return {ok:true,count:0};
  const seen=new Set([first]), st=[[Math.floor(first/Hn),first%Hn]];
  while(st.length){ const [i,j]=st.pop(); const X=vxs[i],Y=hys[j];
    const tryN=(ni,nj,open)=>{ if(!open)return; const k=idx(ni,nj); if(isAct[k]&&!seen.has(k)){seen.add(k);st.push([ni,nj]);} };
    if(i<Wn-1) tryN(i+1,j,hS[Y][i]); if(i>0) tryN(i-1,j,hS[Y][i-1]);
    if(j<Hn-1) tryN(i,j+1,vS[X][j]); if(j>0) tryN(i,j-1,vS[X][j-1]);
  }
  return {ok:seen.size===active,count:active};
}
/* Remove dangling one-arm road stubs that connect to nothing useful. */
function pruneStubs(hS,vS){
  let changed=true;
  while(changed){ changed=false;
    for(let i=0;i<vxs.length;i++)for(let j=0;j<hys.length;j++){
      if(armCountAt(i,j,hS,vS)===1){ const X=vxs[i],Y=hys[j];
        if(i<vxs.length-1&&hS[Y][i]){hS[Y][i]=false;changed=true;}
        else if(i>0&&hS[Y][i-1]){hS[Y][i-1]=false;changed=true;}
        else if(j<hys.length-1&&vS[X][j]){vS[X][j]=false;changed=true;}
        else if(j>0&&vS[X][j-1]){vS[X][j-1]=false;changed=true;}
      }
    }
  }
}
/* Create empty segment-open lookup tables for horizontal and vertical roads. */
function freshSegs(){ const hS={},vS={};
  for(const Y of hys) hS[Y]=new Array(Math.max(0,vxs.length-1)).fill(true);
  for(const X of vxs) vS[X]=new Array(Math.max(0,hys.length-1)).fill(true);
  return {hS,vS}; }
/* Decide which road segments are open vs closed (roadwork/dropped roads). */
function generateSegments(){
  const frac=clamp(0.4*(1-roadKeepProb)+0.14,0.1,0.42);
  const need=Math.max(6, Math.floor(vxs.length*hys.length*0.32));
  let best=null,bestCount=-1;
  for(let attempt=0;attempt<8;attempt++){
    const {hS,vS}=freshSegs();
    const segs=[];
    for(const Y of hys) for(let i=0;i<vxs.length-1;i++) segs.push({t:'h',c:Y,i});
    for(const X of vxs) for(let j=0;j<hys.length-1;j++) segs.push({t:'v',c:X,i:j});
    for(let i=segs.length-1;i>0;i--){ const k=ri(i+1); [segs[i],segs[k]]=[segs[k],segs[i]]; }
    const target=Math.floor(segs.length*frac); let del=0;
    for(const s of segs){ if(del>=target) break; const arr=s.t==='h'?hS[s.c]:vS[s.c]; if(!arr[s.i]) continue;
      arr[s.i]=false; if(activeConnected(hS,vS).ok) del++; else arr[s.i]=true; }
    pruneStubs(hS,vS);
    const ac=activeConnected(hS,vS);
    if(ac.ok&&ac.count>=need){ hSeg=hS; vSeg=vS; return; }
    if(ac.ok&&ac.count>bestCount){ bestCount=ac.count; best={hS,vS}; }
  }
  if(best){ hSeg=best.hS; vSeg=best.vS; } else { const f=freshSegs(); hSeg=f.hS; vSeg=f.vS; }
}
/* Create intersection records at every road crossing with arm flags and control type. */
function buildIntersections(){
  intersections=new Map();
  for(let j=0;j<hys.length;j++) for(let i=0;i<vxs.length;i++){
    const X=vxs[i],Y=hys[j];
    const E=i<vxs.length-1&&hSeg[Y][i], Wr=i>0&&hSeg[Y][i-1], S=j<hys.length-1&&vSeg[X][j], N=j>0&&vSeg[X][j-1];
    const arm=(E?1:0)+(Wr?1:0)+(S?1:0)+(N?1:0);
    let control='none'; if(arm>=3) control=Math.random()<0.15?'stop':'signal';
    intersections.set(X+'_'+Y,{x:X,y:Y,i,j,E,W:Wr,S,N,arm,control,signalized:control==='signal',offset:Math.random()*CYCLE,turning:null,occupant:null,occTime:0,
      sigAxis:Math.random()<0.5?'h':'v',sigPhase:'green',sigT:Math.random()*MAXG,dmdH:0,dmdV:0});
  }
}
/* Top-level world build: roads, intersections, lanes, graph, scene, cars. */
function buildWorld(){
  const m=46; xmin=m; xmax=Math.round(W-m); ymin=m; ymax=Math.round(H-m);
  vxs=dropInterior(genPositions(xmin,xmax),roadKeepProb); hys=dropInterior(genPositions(ymin,ymax),roadKeepProb);
  xmin=vxs[0]; xmax=vxs[vxs.length-1]; ymin=hys[0]; ymax=hys[hys.length-1];
  roadCfg=new Map();
  for(const X of vxs) roadCfg.set('v_'+X,makeRoadCfg('v',X));
  for(const Y of hys) roadCfg.set('h_'+Y,makeRoadCfg('h',Y));
  generateSegments(); buildIntersections(); buildGraph();
  lanes=[]; laneMap=new Map();
  for(const X of vxs) addLanesForRoad(getCfg('v',X));
  for(const Y of hys) addLanesForRoad(getCfg('h',Y));
  buildBars(); buildScene(); buildBarriers(roadblockTarget); buildBackground(); spawnCars(targetCount);
}
/* Create the individual lane records (per direction, per index) for one road. */
function addLanesForRoad(cfg){
  const {axis,center}=cfg; const loC=axis==='h'?xmin:ymin, hiC=axis==='h'?xmax:ymax;
  for(const dir of cfg.dirs){ const nD=cfg.lanesPerDir;
    for(let idx=0;idx<nD;idx++){
      let coord;
      if(cfg.oneway){ const pr=axis==='h'?dir:-dir; coord=center+pr*(idx-(nD-1)/2)*LW; }
      else coord=axis==='h'?center+dir*(0.5+idx)*LW:center-dir*(0.5+idx)*LW;
      const crossings=[];
      if(axis==='h'){ for(const X of vxs) crossings.push({P:X,key:X+'_'+center,perpHalf:getCfg('v',X).half}); }
      else { for(const Y of hys) crossings.push({P:Y,key:center+'_'+Y,perpHalf:getCfg('h',Y).half}); }
      crossings.sort((a,b)=> dir>0?a.P-b.P:b.P-a.P);
      const lane={axis,dir,roadCenter:center,laneIdx:idx,nLanesDir:nD,coord,half:cfg.half,loC,hiC,crossings,cfg,id:axis+'_'+dir+'_'+center+'_'+idx};
      lanes.push(lane); laneMap.set(lane.id,lane);
    } }
}
/* Return the pixel span [lo,hi] covered by all lanes of one direction on a road. */
function dirSpan(axis,center,dir){ const cfg=getCfg(axis,center); let lo=Infinity,hi=-Infinity;
  for(const lane of lanes){ if(lane.cfg===cfg&&lane.dir===dir){ lo=Math.min(lo,lane.coord); hi=Math.max(hi,lane.coord); } }
  if(lo===Infinity){lo=center;hi=center;} return [lo-LW/2,hi+LW/2]; }
/* Build stop-bar / signal-bar geometry drawn at controlled intersection approaches. */
function buildBars(){
  bars=[];
  for(const it of intersections.values()){ if(!it.signalized) continue;
    const X=it.x,Y=it.y, vHalf=getCfg('v',X).half, hHalf=getCfg('h',Y).half, hCfg=getCfg('h',Y), vCfg=getCfg('v',X);
    for(const d of hCfg.dirs){ if(!(d>0?it.W:it.E)) continue; const [lo,hi]=dirSpan('h',Y,d); const bx=d>0?X-vHalf:X+vHalf; bars.push({x:bx-1.5,y:lo,w:3,h:hi-lo,axis:'h',intObj:it}); }
    for(const d of vCfg.dirs){ if(!(d>0?it.N:it.S)) continue; const [lo,hi]=dirSpan('v',X,d); const by=d>0?Y-hHalf:Y+hHalf; bars.push({x:lo,y:by-1.5,w:hi-lo,h:3,axis:'v',intObj:it}); }
  }
}
/* Compute the open longitudinal ranges of a lane (skipping closed segments). */
function laneOpenRanges(lane){
  const r=[];
  if(lane.axis==='h'){ const seg=hSeg[lane.roadCenter]; for(let i=0;i<seg.length;i++) if(seg[i]) r.push([vxs[i],vxs[i+1]]); }
  else { const seg=vSeg[lane.roadCenter]; for(let j=0;j<seg.length;j++) if(seg[j]) r.push([hys[j],hys[j+1]]); }
  return r;
}
/* Place roadwork barriers on random open lane positions, up to `target`. */
function buildBarriers(target){
  barriers=[];
  const cand=lanes.filter(l=>l.nLanesDir>=2);
  for(let i=cand.length-1;i>0;i--){ const k=ri(i+1); [cand[i],cand[k]]=[cand[k],cand[i]]; }
  for(const lane of cand){ if(barriers.length>=target) break;
    const sib=laneMap.get(lane.axis+'_'+lane.dir+'_'+lane.roadCenter+'_'+(lane.laneIdx===0?1:0));
    for(const [lo,hi] of laneOpenRanges(lane)){ if(barriers.length>=target) break;
      let a,b;
      if(lane.axis==='h'){ a=lo+getCfg('v',lo).half+18; b=hi-getCfg('v',hi).half-18; }
      else { a=lo+getCfg('h',lo).half+18; b=hi-getCfg('h',hi).half-18; }
      if(b-a<24) continue; const c=rand(a,b);
      let clash=false; for(const bar of barriers){ if((bar.lane===lane||bar.lane===sib)&&Math.abs(bar.c-c)<46){clash=true;break;} }
      if(clash) continue; barriers.push({lane,c,isBarrier:true});
    } }
}
/* Assemble static scene elements (buildings, parks, trees) in empty blocks. */
function buildScene(){
  sceneCells=[]; nightWindows=[];
  const roofs=['#3a3f47','#2f343c','#45413b','#383c44','#4a463f','#34373d','#41372f'];
  for(let i=0;i<vxs.length-1;i++) for(let j=0;j<hys.length-1;j++){
    const x1=vxs[i],x2=vxs[i+1],y1=hys[j],y2=hys[j+1];
    const lx=x1+getCfg('v',x1).half+4, rx=x2-getCfg('v',x2).half-4;
    const ty=y1+getCfg('h',y1).half+4, by=y2-getCfg('h',y2).half-4;
    if(rx-lx<18||by-ty<18) continue;
    const park=Math.random()<0.24;
    const cell={park,trees:[],buildings:[],lx,ty,rx,by};

/* ---- routing ---- */

  if(lane.axis==='h'){ const vCfg=getCfg('v',it.x);   // horizontal road meeting a vertical cross-road
    if(lane.dir>0){ if(it.E)m.push('straight'); if(it.S&&vCfg.dirsSet.has(1))m.push('right'); if(it.N&&vCfg.dirsSet.has(-1))m.push('left'); }

/* True if the adjacent same-direction lane is clear enough to change into. */
function siblingClear(car,sib){
  for(const o of cars){ if(o.lane!==sib||o.mode!=='lane') continue; const dd=sib.dir*(o.c-car.c); if(dd>-CAR_L*3.2&&dd<68) return false; }
  for(const b of barriers){ if(b.lane!==sib) continue; const dd=sib.dir*(b.c-car.c); if(dd>-CAR_L*3.2&&dd<68) return false; }
  return true;
}
/* Intelligent-Driver-Model acceleration from speed, gap, lead speed and desired speed. */
function idm(v,gap,vLead,vmax){ gap=Math.max(gap,0.1); const dv=v-vLead;
  const sStar=S0+Math.max(0,v*T_HW+v*dv/(2*Math.sqrt(ACC*DEC)));
  return ACC*(1-Math.pow(v/Math.max(vmax,1),4)-Math.pow(sStar/gap,2)); }

/* ---- police ---- */
function releasePolice(car){ if(car.target){ car.target.pulledOver=false; car.target=null; } car.pstate='patrol'; car.cooldown=rand(10,20); }
/* Fix up inconsistent police state each frame (orphaned targets, etc.). */
function sanitizePolice(){
  const set=new Set(cars);
  for(const c of cars) if(c.police&&c.target&&!set.has(c.target)){ c.target=null; c.pstate='patrol'; c.cooldown=2; }
  const tg=new Set(); for(const c of cars) if(c.police&&c.target) tg.add(c.target);
  for(const c of cars) if(c.pulledOver&&!tg.has(c)) c.pulledOver=false;
}

/* ---- cars ---- */
function makeCar(lane,c){
  const car={lane,c,speed:rand(0,30),vmax:rand(58,112),mode:'lane',move:null,decKey:null,latOffset:0,waitTime:0,
    disabled:false,disabledBy:null,clearAt:0,graceUntil:0,conn:null,connD:0,turnInt:null,
    stopTime:null,stopKey:null,occInt:null,occKey:null,holdTime:0,
    police:false,pstate:'patrol',ptimer:0,cooldown:0,target:null,pulledOver:false,
    len:CAR_L,wid:CAR_W,isBus:false,busPause:0,brake:0,dest:null,route:null,
    x:0,y:0,angle:0,tint:CAR_COLORS[ri(CAR_COLORS.length)].slice(),
    odometer:0, maxSpeed:0, totalTime:0};   // stats for info popup
  assignDest(car); placeCar(car); return car;
}
/* Find a random lane position with enough clearance to spawn/relocate a car. */
function freeSpot(){
  for(let t=0;t<60;t++){
    const lane=lanes[ri(lanes.length)], ranges=laneOpenRanges(lane); if(!ranges.length) continue;
    const [lo,hi]=ranges[ri(ranges.length)]; let a,b;
    if(lane.axis==='h'){ a=lo+getCfg('v',lo).half+12; b=hi-getCfg('v',hi).half-12; }
    else { a=lo+getCfg('h',lo).half+12; b=hi-getCfg('h',hi).half-12; }
    if(b-a<CAR_L*1.5) continue; const c=rand(a,b);
    let ok=true; for(const o of cars){ if(o.lane===lane&&Math.abs(o.c-c)<CAR_L*2.3){ok=false;break;} }
    if(ok) for(const bar of barriers){ if(bar.lane===lane&&Math.abs(bar.c-c)<CAR_L*2.3){ok=false;break;} }
    if(ok) return {lane,c};
  } return null;
}
/* Promote some cars to police based on the police slider. */
function assignPolice(){
  for(const c of cars) c.police=false;
  const pn=cars.length>=20?Math.max(2,Math.round(cars.length/30)):(cars.length>=8?1:0);
  const idx=[...cars.keys()]; for(let i=idx.length-1;i>0;i--){ const j=ri(i+1); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  for(let k=0;k<pn;k++){ const c=cars[idx[k]]; c.police=true; c.pstate='patrol'; c.cooldown=rand(3,9); c.target=null; }
}
function assignBuses(){ const want=cars.length>=30?(2+ri(2)):(cars.length>=12?1:0); let made=0;
  for(const c of cars){ if(made>=want) break; if(c.police) continue; c.isBus=true; c.len=BUS_L; c.vmax=rand(42,60); c.tint=[245,196,72]; made++; } }
/* (Re)spawn the full car population of size n into free spots. */
function spawnCars(n){ cars=[]; let tries=0;
  while(cars.length<n&&tries<n*40){ tries++; const s=freeSpot(); if(s) cars.push(makeCar(s.lane,s.c)); } assignPolice(); assignBuses(); }
/* Add or remove cars to match a new target population. */
function adjustCount(n){
  if(n>cars.length){ let tries=0; while(cars.length<n&&tries<(n-cars.length)*40){ tries++; const s=freeSpot(); if(s) cars.push(makeCar(s.lane,s.c)); } }
  else if(n<cars.length){ for(let i=n;i<cars.length;i++) if(cars[i].police) releasePolice(cars[i]); cars.length=n; }
  sanitizePolice();
}
/* Teleport a car to a free spot (last-resort recovery; rarely used). */
function relocateCar(car){
  releaseBox(car); const s=freeSpot(); if(!s) return; if(car.target) releasePolice(car); if(car.turnInt){ car.turnInt.turning=null; car.turnInt=null; } if(car.occInt){ if(car.occInt.occupant===car) car.occInt.occupant=null; car.occInt=null; car.occKey=null; }
  car.lane=s.lane; car.c=s.c; car.speed=rand(0,20); car.mode='lane'; car.move=null; car.decKey=null; car.conn=null; car.latOffset=0; car.waitTime=0; placeCar(car);
}

/* ---- update ---- */
function updateCar(car,dt,t){
  if(car.disabled){ car.speed=0; placeCar(car); return; }                 // crashed cars sit still
  if(car.pulledOver&&car.mode==='lane'){ car.speed=Math.max(0,car.speed-DEC*1.3*dt); car.c+=car.lane.dir*car.speed*dt;  // pulled over by police: ease to the curb
    car.latOffset+=(0-car.latOffset)*Math.min(1,dt*7); placeCar(car); return; }
  if(car.mode==='turn'){                                                   // --- mid-turn: follow the Bezier connector ---
    const tL=car.conn.targetLane, tC=car.conn.targetC; let blocked=false;
    for(const o of cars){ if(o.lane===tL&&o.mode==='lane'){ const dd=tL.dir*(o.c-tC); if(dd>-CAR_L*0.6&&dd<CAR_L*1.7){blocked=true;break;} } }  // car waiting on the target lane?
    if(!blocked) for(const b of barriers){ if(b.lane===tL){ const dd=tL.dir*(b.c-tC); if(dd>-CAR_L*0.6&&dd<CAR_L*1.7){blocked=true;break;} } }       // barrier on the target lane?
    if(!blocked){ const fo=forwardObstacle(car); if(fo.gap<5) blocked=true; }   // someone directly in front along the arc?
    if(blocked) car.holdTime=(car.holdTime||0)+dt; else car.holdTime=0;
    if(car.holdTime>2.5) blocked=false;                                    // ...but never freeze forever; force through after 2.5s
    const tgt=blocked?0:Math.min(TURN_SPEED,car.vmax); car.speed+=(tgt-car.speed)*Math.min(1,dt*5);  // ease toward turn speed (or stop)
    const nd=car.connD+car.speed*dt;                                       // advance along the connector arc-length
    const finish=()=>{ car.lane=tL; car.c=tC; car.mode='lane'; car.move=null; car.decKey=null; car.conn=null; car.latOffset=0; car.holdTime=0;  // land on the target lane, back to normal driving
      if(car.turnInt){ if(car.turnInt.turning===car) car.turnInt.turning=null; car.turnInt=null; }   // release the turn reservation
      if(car.occInt){ if(car.occInt.occupant===car) car.occInt.occupant=null; car.occInt=null; car.occKey=null; } };
    if(nd>=car.conn.len){ if(blocked){ car.connD=car.conn.len; car.speed=0; } else finish(); }   // reached the end: finish unless blocked at the exit
    else { car.connD=nd; }
    placeCar(car); return;
  }

  const lane=car.lane;
  let nc=null,ncd=0;
  for(const cr of lane.crossings){ const d=lane.dir*(cr.P-car.c); if(d>-cr.perpHalf-0.01){ nc=cr; ncd=d; break; } }
  if(car.occKey){ if(!nc||nc.key!==car.occKey){ const oi=car.occInt; if(oi&&oi.occupant===car) oi.occupant=null; car.occInt=null; car.occKey=null; } }
  if(!nc){ car.speed=0; return; }

  let obsGap=Infinity,obsV=0,passBlock=false;
  const la=leadAhead(car);
  if(la.lead){ obsGap=la.gap; obsV=la.stopped?0:(la.lead.speed||0); const ld=la.lead; passBlock=ld.disabled||ld.isBarrier||ld.pulledOver||(ld.mode==='lane'&&ld.speed<car.vmax*0.4); }
  { const fo=forwardObstacle(car); if(fo.gap<obsGap){ obsGap=fo.gap; obsV=Math.min(obsV,fo.v); passBlock=true; } }

  if(car.police){
    car.cooldown=Math.max(0,car.cooldown-dt);
    if(car.pstate==='patrol'){ const ld=la.lead;
      if(car.cooldown<=0&&ld&&!ld.police&&!ld.disabled&&!ld.pulledOver&&!ld.isBarrier&&ld.mode==='lane'&&la.gap>CAR_L*0.7&&la.gap<70&&ld.speed>10&&Math.random()<0.35*dt){
        car.target=ld; ld.pulledOver=true; car.pstate='engaging'; } }
    else if(car.pstate==='engaging'){ if(!car.target||car.target.disabled) releasePolice(car);
      else if(car.speed<5&&car.target.speed<3){ car.pstate='stopped'; car.ptimer=rand(10,18); } }
    else if(car.pstate==='stopped'){ car.ptimer-=dt; if(car.target) car.target.pulledOver=true; if(car.ptimer<=0||!car.target) releasePolice(car); }
  }

  let distToStop=Infinity, inBox=false;
  if(nc){
    distToStop=ncd-(nc.perpHalf+STOPGAP); inBox=ncd<nc.perpHalf;
    const key=nc.key, it=intersections.get(key);
    if(it.control==='signal'&&distToStop<DECISION_DIST&&distToStop>-nc.perpHalf){ /* queue counted in updateSignals */ }
    if(key!==car.decKey){ car.decKey=key; car.move=null; car.stopKey=null; car.stopTime=null; }
    if(car.move===null&&distToStop<DECISION_DIST){ const mv=chooseMove(car,lane,it); if(mv===null){ car.speed=0; return; } car.move=mv; }
    if(car.police&&car.pstate==='engaging'&&car.move){ const vm=validMoves(lane,it); if(vm.includes('straight')) car.move='straight'; else releasePolice(car); }
    if(car.move&&car.move!=='straight'&&!car.police&&car.waitTime>1.5){
      const X0=lane.axis==='h'?nc.P:lane.roadCenter, Y0=lane.axis==='h'?lane.roadCenter:nc.P;
      const stuck = moveBlocked(lane,nc,car.move) || (car.move==='left'&&!leftClear(car,X0,Y0));
      if(stuck){
        const straightOpen = validMoves(lane,it).includes('straight') && !moveBlocked(lane,nc,'straight');
        if(straightOpen) car.move='straight';
        else { const open=validMoves(lane,it).filter(m=>m!==car.move&&m!=='straight'&&!moveBlocked(lane,nc,m)); if(open.length) car.move=open[0]; }
      }
    }
    if(!inBox&&car.move){
      let needStop=false, hardStop=false;
      const straight=car.move==='straight';
      const X=lane.axis==='h'?nc.P:lane.roadCenter, Y=lane.axis==='h'?lane.roadCenter:nc.P;
      const boxClear = !la.lead || la.gap > nc.perpHalf + CAR_L*0.6;
      if(it.control==='signal'){
        const st=sigState(it,lane.axis);
        if(st==='red'){ needStop=true; hardStop=true; }
        else if(st==='yellow'){ const sd=car.speed*car.speed/(2*DEC)+CAR_L*0.6; if(distToStop>sd){ needStop=true; hardStop=true; } }
        if(!needStop && straight && !boxClear) needStop=true;
        if(!needStop && !straight){
          if(it.turning&&it.turning!==car) needStop=true;
          else if(car.move==='left'&&!leftClear(car,X,Y)) needStop=true;
          else if(entryBlocked(lane,nc.P,car.move)) needStop=true;
        }
      } else if(it.control==='stop'){
        if(car.speed<6&&distToStop<S0+6&&car.stopKey!==nc.key){ car.stopKey=nc.key; car.stopTime=t; }
        const stopped=car.stopKey===nc.key&&car.stopTime!=null;
        if(it.occupant===car){ /* keep going */ }
        else if(it.occupant===null&&stopped){
          const exitOk = straight ? boxClear : !entryBlocked(lane,nc.P,car.move);
          if(exitOk){ it.occupant=car; it.occTime=t; car.occInt=it; car.occKey=nc.key; car.stopKey=null; car.stopTime=null; }
          else needStop=true;
        } else needStop=true;
      } else {
        if(!straight && entryBlocked(lane,nc.P,car.move)) needStop=true;
      }
      if(!canEnter(it,car,t)) needStop=true;
      // Impatience lets a long-waiting car force through — but NEVER a turn whose exit
      // lane is blocked (that seeds box-gridlock). Straight movement may always force,
      // since the car can actually proceed and clear the box.
      if(needStop && !hardStop && car.waitTime>IMPATIENCE && (straight || !entryBlocked(lane,nc.P,car.move))){
        needStop=false;
        if(it.control==='stop' && it.occupant===null){ it.occupant=car; it.occTime=t; car.occInt=it; car.occKey=nc.key; car.stopKey=null; car.stopTime=null; }
        if(straight) claimBox(it,car,t);
      }
      if(!needStop && straight && distToStop<=0) claimBox(it,car,t);
      if(needStop && car._inIt===it && !car._wasIn) releaseBox(car);
      if(needStop){ if(distToStop<obsGap){ obsGap=distToStop; obsV=0; } }
      else if(!straight && distToStop<=0){
        // final lane-discipline guard: never turn against this lane's allowed moves
        if(!validMoves(lane,it).includes(car.move)){ car.move='straight'; }
        else { if(it.control==='signal'){ it.turning=car; it.turnTime=t; car.turnInt=it; }
          claimBox(it,car,t); initiateTurn(car,lane,nc); placeCar(car); return; }
      }
    }
    if(inBox && car.move && car.move!=='straight' && car.mode==='lane'){
      // same guard for cars that reach the box still holding a turn intent
      if(!validMoves(lane,it).includes(car.move)){ car.move='straight'; }
      else { if(it.control==='signal'){ it.turning=car; it.turnTime=t; car.turnInt=it; }
        claimBox(it,car,t); initiateTurn(car,lane,nc); placeCar(car); return; }
    }
  }

  if(car.isBus&&car.busPause>0){ car.busPause-=dt; obsGap=Math.min(obsGap,1); obsV=0; }
  const acc=idm(car.speed,obsGap,obsV,car.vmax);
  car.brake = acc<-7 ? 1 : Math.max(0,(car.brake||0)-dt*5);
  car.speed=clamp(car.speed+acc*dt,0,car.vmax); car.c+=lane.dir*car.speed*dt;
  // accumulate lifetime stats for the info popup
  car.odometer=(car.odometer||0)+car.speed*dt;
  car.totalTime=(car.totalTime||0)+dt;
  if(car.speed>car.maxSpeed) car.maxSpeed=car.speed;
  car.waitTime=car.speed<4?car.waitTime+dt:0;
  if(car.isBus&&car.busPause>0) car.waitTime=0;
  if(passBlock&&la.gap<PASS_GAP&&car.speed<car.vmax*0.6&&(distToStop>26||!nc)&&!(car.police&&car.pstate==='engaging')){
    const sib=laneMap.get(lane.axis+'_'+lane.dir+'_'+lane.roadCenter+'_'+(lane.laneIdx===0?1:0));
    if(sib&&sib.nLanesDir>=2&&siblingClear(car,sib)){ car.latOffset=lane.coord+car.latOffset-sib.coord; car.lane=sib; car.decKey=null; car.move=null; }
  }
  car.latOffset+=(0-car.latOffset)*Math.min(1,dt*7); placeCar(car);
}
/* Recompute a car’s pixel x/y/angle from its lane coordinate and lateral offset. */
function placeCar(car){
  if(car.mode==='turn'){ const p=connPoint(car.conn,car.connD), p2=connPoint(car.conn,Math.min(car.conn.len,car.connD+1));
    car.x=p.x; car.y=p.y; car.angle=Math.atan2(p2.y-p.y,p2.x-p.x); return; }
  const lane=car.lane;
  if(lane.axis==='h'){ car.x=car.c; car.y=lane.coord+car.latOffset; car.angle=lane.dir>0?0:Math.PI; }
  else { car.x=lane.coord+car.latOffset; car.y=car.c; car.angle=lane.dir>0?Math.PI/2:-Math.PI/2; }
}

/* ---- collisions ---- */
function carCorners(car,s){ const l=(car.len||CAR_L)*s/2,w=(car.wid||CAR_W)*s/2,co=Math.cos(car.angle),si=Math.sin(car.angle),out=[];
  for(const [dx,dy] of [[l,w],[l,-w],[-l,-w],[-l,w]]) out.push({x:car.x+dx*co-dy*si,y:car.y+dx*si+dy*co}); return out; }
/* Separating-axis test: true if two convex polygons (car bodies) overlap. */
function polyOverlap(a,b){
  for(const poly of [a,b]) for(let i=0;i<poly.length;i++){
    const p1=poly[i],p2=poly[(i+1)%poly.length], nx=-(p2.y-p1.y),ny=(p2.x-p1.x);
    let mnA=1e9,mxA=-1e9,mnB=1e9,mxB=-1e9;
    for(const p of a){ const d=p.x*nx+p.y*ny; if(d<mnA)mnA=d; if(d>mxA)mxA=d; }
    for(const p of b){ const d=p.x*nx+p.y*ny; if(d<mnB)mnB=d; if(d>mxB)mxB=d; }
    if(mxA<mnB||mxB<mnA) return false; } return true;
}
/* Disable any pair of cars whose bodies deeply overlap (collision -> crash). */
function detectCollisions(t){
  const e=cars.filter(c=>!c.disabled&&Math.abs(c.latOffset)<2.5&&!c.police&&!c.pulledOver&&c.graceUntil<=t);
  for(let i=0;i<e.length;i++) for(let j=i+1;j<e.length;j++){
    const a=e[i],b=e[j], dx=a.x-b.x,dy=a.y-b.y; if(dx*dx+dy*dy>(CAR_L*1.2)*(CAR_L*1.2)) continue;
    if(polyOverlap(carCorners(a,0.6),carCorners(b,0.6))){
      for(const c of [a,b]){ c.disabled=true; c.disabledBy='collision'; c.clearAt=t+CRASH_CLEAR; c.speed=0; if(c.turnInt){ c.turnInt.turning=null; c.turnInt=null; } if(c.occInt){ if(c.occInt.occupant===c) c.occInt.occupant=null; c.occInt=null; c.occKey=null; } }
    } }
}

/* ---- background ---- */
function rr(g,x,y,w,h,r){ r=Math.min(r,w/2,h/2);
  g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
/* Lighten/darken a hex colour by an amount. */
function shade(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,gn=(n>>8)&255,b=n&255;
  if(amt<0){ const mlt=1+amt; r*=mlt; gn*=mlt; b*=mlt; } else { r+=(255-r)*amt; gn+=(255-gn)*amt; b+=(255-b)*amt; }
  return 'rgb('+(r|0)+','+(gn|0)+','+(b|0)+')'; }
/* Draw a tree (shadow, foliage) at a position. */
function drawTree(g,x,y,r,f){
  g.fillStyle='rgba(0,0,0,'+(0.2+0.2*f)+')'; g.beginPath(); g.ellipse(x+1.6,y+r*0.7,r*0.95,r*0.5,0,0,7); g.fill();
  g.fillStyle='#3a2a1c'; g.fillRect(x-1.2,y-1,2.4,r*0.8);
  g.fillStyle='#1f5e3a'; g.beginPath(); g.arc(x,y,r,0,7); g.fill();
  g.fillStyle='#2f8552'; g.beginPath(); g.arc(x-r*0.3,y-r*0.32,r*0.62,0,7); g.fill();
  g.fillStyle='rgba(120,210,150,'+(0.22+0.4*f)+')'; g.beginPath(); g.arc(x-r*0.4,y-r*0.4,r*0.3,0,7); g.fill();
}
/* Draw a building block with roof shading and small detail marks. */
function drawBuilding(g,b,f){
  const Hh=Math.min(26,(5+b.height*26)*(0.5+0.7*f)), ex=-Hh*0.2, ey=-Hh*0.24;
  const x=b.x,y=b.y,w=b.w,h=b.h, rxx=x+w, byy=y+h;
  g.fillStyle='rgba(0,0,0,'+(0.22+0.18*f)+')'; g.fillRect(x+2.5,y+2.5,w,h);
  g.fillStyle='#0c0f15'; g.fillRect(x,y,w,h);
  g.fillStyle=shade(b.roof,-0.36);
  g.beginPath(); g.moveTo(rxx,y); g.lineTo(rxx,byy); g.lineTo(rxx+ex,byy+ey); g.lineTo(rxx+ex,y+ey); g.closePath(); g.fill();
  g.fillStyle=shade(b.roof,-0.52);
  g.beginPath(); g.moveTo(x,byy); g.lineTo(rxx,byy); g.lineTo(rxx+ex,byy+ey); g.lineTo(x+ex,byy+ey); g.closePath(); g.fill();
  // wall windows
  g.fillStyle='rgba(255,224,150,'+(0.12+0.5*f)+')';
  for(let r=0;r<5;r++){ const wy=y+5+r*((h-8)/4)+ey*0.55;
    if(((b.seed*131+r*977)%100)<(16+f*58)){ g.fillRect(rxx+ex*0.55-1.4,wy,1.8,1.8); g.fillRect(rxx+ex*0.85-1.4,wy,1.8,1.8); } }
  // roof
  g.fillStyle=b.roof; g.fillRect(x+ex,y+ey,w,h);
  g.fillStyle=shade(b.roof,0.07); g.fillRect(x+ex+1.6,y+ey+1.6,w-3.2,h-3.2);
  g.strokeStyle='rgba(255,255,255,0.10)'; g.lineWidth=1; g.strokeRect(x+ex+0.5,y+ey+0.5,w-1,h-1);
  const hv=1+(b.seed%3);
  for(let k=0;k<hv;k++){ const hx=x+ex+4+((b.seed*7+k*53)%Math.max(2,w-9)), hyy=y+ey+4+((b.seed*5+k*97)%Math.max(2,h-8));
    g.fillStyle='rgba(18,20,24,0.92)'; g.fillRect(hx,hyy,4,3); g.fillStyle='rgba(255,255,255,0.07)'; g.fillRect(hx,hyy,4,1); }
  if(b.tank){ g.fillStyle='#2a2622'; g.beginPath(); g.arc(x+ex+w*0.5,y+ey+h*0.5,2.8,0,7); g.fill(); }
}
/* Draw a green park cell. */
function drawPark(g,cell,f){ const {lx,ty,rx,by}=cell, w=rx-lx,h=by-ty;
  g.fillStyle='rgb('+(12+f*8)+','+(40+f*38)+','+(24+f*20)+')'; rr(g,lx,ty,w,h,5); g.fill();
  g.strokeStyle='rgba(120,200,150,'+(0.08+0.12*f)+')'; g.lineWidth=1; rr(g,lx+2,ty+2,w-4,h-4,4); g.stroke();
  for(const tr of cell.trees){ if(tr.r0<0.2+0.85*f) drawTree(g,tr.x,tr.y,tr.baseR*(0.6+0.8*f),f); }
}
/* Draw lane-divider road markings along a road. */
function drawMarkings(g,axis,center){
  const cfg=getCfg(axis,center), L=cfg.totalLanes, half=cfg.half, seg=axis==='h'?hSeg[center]:vSeg[center], pos=axis==='h'?vxs:hys;
  for(let s=0;s<seg.length;s++){ if(!seg[s]) continue; const lo=pos[s],hi=pos[s+1];
    g.lineWidth=1.4;
    for(let k=1;k<L;k++){ const off=(k-L/2)*LW, yellow=!cfg.oneway&&Math.abs(off)<0.5;
      g.strokeStyle=yellow?'rgba(255,200,80,0.55)':'rgba(232,236,240,0.40)'; g.setLineDash(yellow?[18,12]:[10,11]);
      g.beginPath(); if(axis==='h'){ g.moveTo(lo,center+off); g.lineTo(hi,center+off); } else { g.moveTo(center+off,lo); g.lineTo(center+off,hi); } g.stroke(); }
    g.setLineDash([]); g.strokeStyle='rgba(255,255,255,0.10)';
    for(const e of [-half,half]){ g.beginPath(); if(axis==='h'){ g.moveTo(lo,center+e); g.lineTo(hi,center+e); } else { g.moveTo(center+e,lo); g.lineTo(center+e,hi); } g.stroke(); }
    if(cfg.oneway){ g.strokeStyle='rgba(200,220,255,0.5)'; g.lineWidth=2; g.lineCap='round';
      for(let p=lo+34;p<hi-22;p+=58){ let cx,cy; if(axis==='h'){cx=p;cy=center;}else{cx=center;cy=p;}
        g.save(); g.translate(cx,cy); if(axis==='h') g.rotate(cfg.owDir>0?0:Math.PI); else g.rotate(cfg.owDir>0?Math.PI/2:-Math.PI/2);
        g.beginPath(); g.moveTo(-4,-5); g.lineTo(4,0); g.lineTo(-4,5); g.stroke(); g.restore(); } }
  }
}
/* Draw a roadwork barrier (cones/markers) for a barrier record. */
function drawRoadwork(g,b){
  const lane=b.lane, hw=18; let x1,y1,x2,y2;
  if(lane.axis==='h'){ x1=b.c-hw; x2=b.c+hw; y1=lane.coord-LW/2; y2=lane.coord+LW/2; } else { y1=b.c-hw; y2=b.c+hw; x1=lane.coord-LW/2; x2=lane.coord+LW/2; }
  g.fillStyle='rgba(216,161,58,0.18)'; g.fillRect(x1,y1,x2-x1,y2-y1);
  g.strokeStyle='rgba(216,161,58,0.55)'; g.lineWidth=1; g.setLineDash([5,5]); g.strokeRect(x1,y1,x2-x1,y2-y1); g.setLineDash([]);
  for(let i=0;i<=4;i++){ let cx,cy; if(lane.axis==='h'){cx=x1+(x2-x1)*i/4;cy=lane.coord;}else{cy=y1+(y2-y1)*i/4;cx=lane.coord;}
    g.fillStyle='#ff8a3d'; g.beginPath(); g.moveTo(cx,cy-3.5); g.lineTo(cx-2.2,cy+2.5); g.lineTo(cx+2.2,cy+2.5); g.closePath(); g.fill();
    g.fillStyle='rgba(255,255,255,0.85)'; g.fillRect(cx-1.6,cy-0.4,3.2,1.1); }
}
/* Pre-render the static background (roads, scenery) to an offscreen canvas. */
function buildBackground(){
  bg.width=Math.round(W*dpr); bg.height=Math.round(H*dpr); bgx.setTransform(dpr,0,0,dpr,0,0);
  const g=bgx, f=sceneryLevel/100;
  g.fillStyle='#0c130f'; g.fillRect(0,0,W,H);
  for(const cell of sceneCells){ if(cell.park) drawPark(g,cell,f); else { for(const b of cell.buildings) drawBuilding(g,b,f); for(const tr of cell.trees) if(tr.r0<0.2+0.85*f) drawTree(g,tr.x,tr.y,tr.baseR*(0.6+0.75*f),f); } }
  g.fillStyle='#33383f';
  for(const Y of hys){ const h=getCfg('h',Y).half, seg=hSeg[Y]; for(let i=0;i<seg.length;i++) if(seg[i]) g.fillRect(vxs[i],Y-h,vxs[i+1]-vxs[i],2*h); }
  for(const X of vxs){ const h=getCfg('v',X).half, seg=vSeg[X]; for(let j=0;j<seg.length;j++) if(seg[j]) g.fillRect(X-h,hys[j],2*h,hys[j+1]-hys[j]); }
  for(const Y of hys) drawMarkings(g,'h',Y);
  for(const X of vxs) drawMarkings(g,'v',X);
  for(const it of intersections.values()){ if(!((it.E||it.W)&&(it.N||it.S))) continue; const vh=getCfg('v',it.x).half, hh=getCfg('h',it.y).half; g.fillStyle='#3a4047'; g.fillRect(it.x-vh,it.y-hh,2*vh,2*hh); }
  for(const b of barriers) drawRoadwork(g,b);
}

/* ---- render ---- */
function drawCar(car,t){
  ctx.save(); ctx.translate(car.x,car.y); ctx.rotate(car.angle); const l=car.len||CAR_L, w=car.wid||CAR_W;
  ctx.fillStyle='rgba(0,0,0,0.35)'; rr(ctx,-l/2+1.5,-w/2+2,l,w,3); ctx.fill();
  if(car.police){
    ctx.fillStyle=car.disabled?'#ff4d4d':'#1c2433'; rr(ctx,-l/2,-w/2,l,w,3); ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.stroke();
    if(!car.disabled){ ctx.fillStyle='#eef2f7'; ctx.fillRect(-l*0.16,-w/2,l*0.32,w); }
    const engaged=car.pstate==='engaging'||car.pstate==='stopped', ph=Math.floor(t*7)%2;
    ctx.fillStyle=(!car.disabled&&engaged)?(ph?'#3b6bff':'#ff2e2e'):'rgba(60,80,150,0.6)'; ctx.fillRect(-2.6,-w/2+1.4,2.6,w-2.8);
    ctx.fillStyle=(!car.disabled&&engaged)?(ph?'#ff2e2e':'#3b6bff'):'rgba(150,40,50,0.6)'; ctx.fillRect(0,-w/2+1.4,2.6,w-2.8);
    ctx.fillStyle=car.disabled?'rgba(120,20,20,0.85)':'rgba(150,185,225,0.7)'; rr(ctx,l/2-6.5,-w/2+1.6,3.5,w-3.2,1.4); ctx.fill();
  } else {
    if(car.disabled) ctx.fillStyle='#ff4d4d'; else if(car.pulledOver) ctx.fillStyle='#ffc24b';
    else { const c=car.tint; ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')'; }
    rr(ctx,-l/2,-w/2,l,w,3); ctx.fill(); ctx.lineWidth=1; ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.stroke();
    if(car.isBus&&!car.disabled){
      ctx.fillStyle='rgba(36,54,74,0.6)'; rr(ctx,-l/2+3.5,-w/2+1.5,l-9.5,w-3,1.4); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=0.7;
      for(let i=1;i<4;i++){ const xx=-l/2+3.5+(l-9.5)*i/4; ctx.beginPath(); ctx.moveTo(xx,-w/2+1.5); ctx.lineTo(xx,w/2-1.5); ctx.stroke(); }
    }
    ctx.fillStyle=car.disabled?'rgba(120,20,20,0.85)':'rgba(90,140,180,0.75)'; rr(ctx,l/2-7,-w/2+1.6,4,w-3.2,1.5); ctx.fill();
    if(!car.disabled){
      ctx.fillStyle='rgba(255,238,170,0.95)'; ctx.fillRect(l/2-1.2,-w/2+1.2,1.4,2.1); ctx.fillRect(l/2-1.2,w/2-3.3,1.4,2.1);
      const braking=(car.brake||0)>0.2;
      ctx.fillStyle=braking?'rgba(255,46,46,1)':'rgba(150,42,42,0.85)';
      const tw=braking?2:1.2; ctx.fillRect(-l/2-0.2,-w/2+1.2,tw,2.1); ctx.fillRect(-l/2-0.2,w/2-3.3,tw,2.1);
      if(braking){ ctx.fillStyle='rgba(255,80,80,0.45)'; ctx.fillRect(-l/2-2.4,-w/2+1,2.2,w-2); }
      if((car.move==='left'||car.move==='right')&&Math.floor(t*4)%2){ ctx.fillStyle='rgba(255,176,32,1)';
        const sy=car.move==='left'?-w/2:w/2-1.7; ctx.fillRect(l/2-2.4,sy,2.2,1.7); ctx.fillRect(-l/2+0.2,sy,2.2,1.7); }
    }
  }
  ctx.restore();
}
/* Per-frame draw: background, cars, signals, stop signs, day/night overlay, HUD. */
function render(t){
  ctx.drawImage(bg,0,0,W,H);
  for(const it of intersections.values()){ if(it.control!=='stop') continue;
    const vh=getCfg('v',it.x).half, hh=getCfg('h',it.y).half;
    if(it.W) drawStopSign(ctx,it.x-vh-4,it.y+hh+4,5);
    if(it.E) drawStopSign(ctx,it.x+vh+4,it.y-hh-4,5);
    if(it.N) drawStopSign(ctx,it.x-vh-4,it.y-hh-4,5);
    if(it.S) drawStopSign(ctx,it.x+vh+4,it.y+hh+4,5); }
  const phase=(t%DAY_LEN)/DAY_LEN;
  const tint=skyTint(phase);
  if(tint[1]>0.001){ ctx.fillStyle='rgba('+tint[0]+','+tint[1]+')'; ctx.fillRect(0,0,W,H); }
  const nf=clamp((tint[1]-0.10)/0.30,0,1);
  if(nf>0.04){
    ctx.globalCompositeOperation='lighter';
    for(const it of intersections.values()){ if(!((it.E||it.W)&&(it.N||it.S))) continue;
      const gr=ctx.createRadialGradient(it.x,it.y,2,it.x,it.y,40);
      gr.addColorStop(0,'rgba(255,212,142,'+(0.36*nf)+')'); gr.addColorStop(1,'rgba(255,212,142,0)');
      ctx.fillStyle=gr; ctx.fillRect(it.x-40,it.y-40,80,80); }
    ctx.fillStyle='rgba(255,214,150,'+(0.5*nf)+')';
    for(const w of nightWindows) ctx.fillRect(w.x,w.y,w.w,w.w);
    ctx.globalCompositeOperation='source-over';
  }
  for(const b of bars){ const st=sigState(b.intObj,b.axis);
    ctx.fillStyle=st==='green'?'#37d67a':st==='yellow'?'#ffcf3a':'#ff5a5a'; ctx.fillRect(b.x,b.y,b.w,b.h); }
  for(const car of cars) if(!car.police) drawCar(car,t);
  for(const car of cars) if(car.police) drawCar(car,t);
  // --- ⓘ-activated rings: yellow = in box, red = stuck outside ---
  const IB=7; // ⓘ badge radius
  ctx.save();
  for(const it of intersections.values()){
    if(it.arm<3) continue;
    const vh=getCfg('v',it.x).half, hh=getCfg('h',it.y).half;
    const cx=it.x+vh+IB+2, cy=it.y-hh-IB-2;
    const bx=clamp(cx,IB+2,W-IB-2), by=clamp(cy,IB+2,H-IB-2);
    const open=openInfoPanels.has(it);
    // badge
    ctx.beginPath(); ctx.arc(bx,by,IB,0,Math.PI*2);
    ctx.fillStyle=open?'rgba(255,195,0,0.92)':'rgba(30,38,52,0.82)'; ctx.fill();
    ctx.strokeStyle=open?'rgba(255,220,80,0.9)':'rgba(255,255,255,0.22)';
    ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle=open?'#1a1a00':'rgba(200,215,235,0.85)';
    ctx.font='bold 8px ui-monospace,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('i',bx,by+0.5);
    it._ibx=bx; it._iby=by;
    if(!open) continue;

    // collect cars to ring: holders (yellow=in box) + stuck nearby (red)
    boxPrune(it,t);
    const holders=new Set(it.holders||[]);
    const pulse=0.65+0.35*Math.sin(t*8);
    // ring each holder: yellow if physically inside box, dimmer yellow if pre-entry
    for(const c of holders){
      const inBox=c._wasIn;
      const col=inBox?`rgba(255,210,30,${pulse.toFixed(2)})`:`rgba(255,210,30,${(pulse*0.55).toFixed(2)})`;
      const r=(c.len||CAR_L)*0.92;
      ctx.save(); ctx.translate(c.x,c.y);
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=inBox?3:1.8;
      ctx.shadowColor='rgba(255,190,0,0.7)'; ctx.shadowBlur=inBox?10:4; ctx.stroke(); ctx.shadowBlur=0;
      // label: current move / claimed move
      const lbl=(c.move||'?').toUpperCase()+(c._bmove&&c._bmove!==c.move?'/'+c._bmove.toUpperCase():'');
      ctx.fillStyle=col; ctx.font='bold 8px ui-monospace,monospace';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(lbl,0,-r-2);
      ctx.restore();
    }
    // ring stuck cars near this intersection in red (speed<1, waitTime>6, not a holder)
    const stuckR=DECISION_DIST+vh+hh;
    for(const c of cars){
      if(holders.has(c)||c.disabled||c.pulledOver) continue;
      if(c.speed>1||(c.waitTime||0)<6) continue;
      if(Math.hypot(c.x-it.x,c.y-it.y)>stuckR) continue;
      // only ring if this is the car's next intersection
      if(c.decKey!==(it.x+'_'+it.y)) continue;
      const r=(c.len||CAR_L)*0.92;
      ctx.save(); ctx.translate(c.x,c.y);
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,70,70,${pulse.toFixed(2)})`;
      ctx.lineWidth=2.5; ctx.shadowColor='rgba(255,40,40,0.6)'; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
      const lbl=(c.move||'?').toUpperCase();
      ctx.fillStyle=`rgba(255,100,100,${pulse.toFixed(2)})`; ctx.font='bold 8px ui-monospace,monospace';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(lbl,0,-r-2);
      ctx.restore();
    }
  }
  ctx.restore();
  if(nf>0.04){
    ctx.globalCompositeOperation='lighter';
    for(const car of cars){ if(car.disabled) continue;
      const cx=Math.cos(car.angle), sy=Math.sin(car.angle), hx=car.x+cx*11, hy=car.y+sy*11;
      const gr=ctx.createRadialGradient(hx,hy,1,hx,hy,16);
      gr.addColorStop(0,'rgba(255,240,190,'+(0.42*nf)+')'); gr.addColorStop(1,'rgba(255,240,190,0)');
      ctx.fillStyle=gr; ctx.fillRect(hx-16,hy-16,32,32);
      ctx.fillStyle='rgba(255,70,70,'+(0.26*nf)+')'; ctx.beginPath(); ctx.arc(car.x-cx*10,car.y-sy*10,2.8,0,7); ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }
}

/* ---- loop ---- */
function frame(now){
  let dt=(now-lastT)/1000; lastT=now; dt=Math.min(dt,0.05);
  if(!paused){
    simClock+=dt; const steps=Math.max(1,Math.ceil(dt/0.022)), sdt=dt/steps;
    for(let s=0;s<steps;s++){ for(const car of cars) updateCar(car,sdt,simClock); }
    updateSignals(dt);
    detectCollisions(simClock);
    for(const it of intersections.values()){ if(it.occupant&&simClock-it.occTime>4){ const o=it.occupant; it.occupant=null; if(o.occInt===it){ o.occInt=null; o.occKey=null; } } if(it.turning&&simClock-(it.turnTime||0)>4){ it.turning=null; } }
    for(const c of cars){ if(c.disabled&&c.disabledBy==='collision'&&simClock>=c.clearAt){ c.disabled=false; c.disabledBy=null; c.graceUntil=simClock+CRASH_GRACE; c.speed=0; } }
    // Deadlock breaker (last resort): a packed loop of cars can't break itself with
    // local rules, so if any car has been frozen far longer than any legitimate wait,
    // relocate the single worst offender to open the ring. Rare by design.
    deadlockTimer+=dt;
    if(deadlockTimer>=1){ deadlockTimer=0;
      for(const c of cars){ if(c.disabled||c.pulledOver){ c._fz=0; continue; } c._fz=(c.speed<1.5)?(c._fz||0)+1:0; }
      let worst=null; for(const c of cars){ if(!c.disabled&&!c.pulledOver&&(c._fz||0)>18&&(!worst||c._fz>worst._fz)) worst=c; }
      if(worst){ relocateCar(worst); worst._fz=0; }
    }
  }
  render(simClock);
  let moving=0,dead=0; for(const c of cars){ if(c.disabled) dead++; else if(c.speed>6) moving++; }
  movingEl.textContent=moving; deadEl.textContent=dead;
  const ph=(simClock%DAY_LEN)/DAY_LEN;
  todEl.textContent = (ph<0.15||ph>=0.88)?'night':ph<0.30?'dawn':ph<0.72?'day':ph<0.85?'dusk':'night';
  requestAnimationFrame(frame);
}

/* ---- car info popup ---- */
const carPopup=document.getElementById('carPopup');
const cpClose=document.getElementById('cpClose');
let popupTimer=null, popupCar=null;

/* Diagnose why a stopped car is waiting — returns a human-readable string or null. */
function stopReason(car){
  if(!car.lane||car.mode!=='lane'||car.speed>3) return null;
  // find the car's next intersection
  let nc=null;
  for(const cr of car.lane.crossings){ const d=car.lane.dir*(cr.P-car.c); if(d>-cr.perpHalf-0.01){ nc=cr; break; } }
  if(!nc) return null;
  const it=intersections.get(nc.key); if(!it) return null;
  const dist=car.lane.dir*(nc.P-car.c)-nc.perpHalf-STOPGAP;
  if(dist>DECISION_DIST) return null;   // not yet close enough to be signal-gated

  if(it.control==='signal'){
    const st=sigState(it,car.lane.axis);
    if(st==='red')   return '🔴 Red light';
    if(st==='yellow') return '🟡 Yellow — committed to stop';
    // green but still stopped
    if(st==='green'){
      const la=leadAhead(car); if(la.lead&&la.gap<CAR_L*2) return '🟢 Green — queued behind traffic';
      if(it.turning&&it.turning!==car&&car.move!=='straight') return '🟢 Green — waiting for turning car in box';
      if(car.move==='left'){
        const X=car.lane.axis==='h'?nc.P:car.lane.roadCenter, Y=car.lane.axis==='h'?car.lane.roadCenter:nc.P;
        if(!leftClear(car,X,Y)) return '🟢 Green — yielding to oncoming (left turn)';
      }
      if(car.move&&car.move!=='straight'&&entryBlocked(car.lane,nc.P,car.move)) return '🟢 Green — exit lane blocked';
      if(!canEnter(it,car,simClock)) return '🟢 Green — intersection box reserved by another car';
      return '🟢 Green — stopped (congestion ahead)';
    }
  }
  if(it.control==='stop'){
    if(it.occupant&&it.occupant!==car) return '🛑 Stop sign — waiting for intersection to clear';
    if(!car.stopTime) return '🛑 Stop sign — approaching, not yet stopped';
    return '🛑 Stop sign — stopped, waiting for gap';
  }
  if(it.control==='none'){
    const la=leadAhead(car); if(la.lead&&la.gap<CAR_L*2) return 'Uncontrolled — queued behind traffic';
    if(!canEnter(it,car,simClock)) return 'Uncontrolled — box occupied by conflicting car';
    if(car.move&&car.move!=='straight'&&entryBlocked(car.lane,nc.P,car.move)) return 'Uncontrolled — exit lane blocked';
  }
  const la=leadAhead(car);
  if(la.lead&&la.gap<CAR_L*2.5) return 'Following — queued behind traffic';
  return null;
}

function showCarPopup(car, px, py){
  popupCar=car;
  // pixel units: 1 unit ≈ 4 metres (LW=12px = one ~5m lane width)
  const PX_TO_M=4, scale=0.1;   // display in "blocks" where 1 block ≈ 40m
  const dist=(car.odometer*scale).toFixed(1);
  const avg=car.totalTime>1?((car.odometer/car.totalTime)*scale).toFixed(2):'—';
  const maxS=(car.maxSpeed*scale).toFixed(2);
  const curS=(car.speed*scale).toFixed(2);
  const type=car.police?'🚔 Police':car.isBus?'🚌 Bus':'🚗 Car';
  document.getElementById('cpTitle').textContent=type;
  document.getElementById('cpDist').textContent=dist+' bl';
  document.getElementById('cpAvg').textContent=avg+' bl/s';
  document.getElementById('cpMax').textContent=maxS+' bl/s';
  document.getElementById('cpCur').textContent=curS+' bl/s';
  const reason=stopReason(car);
  const reasonEl=document.getElementById('cpReason');
  if(reason){ reasonEl.textContent=reason; reasonEl.style.display='block'; }
  else { reasonEl.style.display='none'; }
  // position near click but keep inside viewport
  const W2=window.innerWidth, H2=window.innerHeight;
  const pw=230, ph=200;
  let lft=px+14, top=py-10;
  if(lft+pw>W2-10) lft=px-pw-14;
  if(top+ph>H2-10) top=H2-ph-10;
  if(top<10) top=10;
  carPopup.style.left=lft+'px'; carPopup.style.top=top+'px';
  carPopup.classList.add('visible');
  clearTimeout(popupTimer);
  popupTimer=setTimeout(hideCarPopup, 20000);
}
function hideCarPopup(){ carPopup.classList.remove('visible'); clearTimeout(popupTimer); popupTimer=null; popupCar=null; }
cpClose.addEventListener('click', hideCarPopup);
carPopup.addEventListener('click', hideCarPopup);

/* ---- interaction ---- */
// Check if a canvas-space point hits an ⓘ badge on any intersection
function hitInfoBadge(mx,my){
  const IB=7, HIT=(IB+4)*(IB+4);
  for(const it of intersections.values()){
    if(it.arm<3||it._ibx===undefined) continue;
    const dx=it._ibx-mx, dy=it._iby-my;
    if(dx*dx+dy*dy<HIT) return it;
  }
  return null;
}
canvas.addEventListener('pointerdown',e=>{
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  // 1. ⓘ badge hit — toggle info panel, never propagate further
  const ib=hitInfoBadge(mx,my);
  if(ib){ if(openInfoPanels.has(ib)) openInfoPanels.delete(ib); else openInfoPanels.add(ib); return; }
  // 2. car hit — show popup
  let best=null,bd=20*20;
  for(const car of cars){ const dx=car.x-mx,dy=car.y-my,d=dx*dx+dy*dy; if(d<bd){bd=d;best=car;} }
  if(best){ showCarPopup(best, e.clientX, e.clientY); return; }
  hideCarPopup();
  // 3. intersection body hit — cycle control
  let bi=null,bdist=34*34;
  for(const it of intersections.values()){ if(it.arm<3) continue; const dx=it.x-mx,dy=it.y-my,d=dx*dx+dy*dy; if(d<bdist){ bdist=d; bi=it; } }
  if(bi) cycleControl(bi);
});
const hud=document.getElementById('hud');
const pauseBtn=document.getElementById('pause'),regenBtn=document.getElementById('regen'),reviveBtn=document.getElementById('revive');
const countInput=document.getElementById('count'),countLbl=document.getElementById('countLbl');
const roadsInput=document.getElementById('roads'),roadsLbl=document.getElementById('roadsLbl');
const blocksInput=document.getElementById('blocks'),blocksLbl=document.getElementById('blocksLbl');
const sceneInput=document.getElementById('scene'),sceneLbl=document.getElementById('sceneLbl');
const movingEl=document.getElementById('moving'),deadEl=document.getElementById('dead'),todEl=document.getElementById('tod');
const toggleBtn=document.getElementById('toggle'),hideBtn=document.getElementById('hide');
pauseBtn.onclick=()=>{ paused=!paused; pauseBtn.textContent=paused?'Resume':'Pause'; };
regenBtn.onclick=()=>buildWorld();
reviveBtn.onclick=()=>{ for(const c of cars){ c.disabled=false; c.disabledBy=null; } };
countInput.oninput=()=>{ targetCount=+countInput.value; countLbl.textContent=targetCount; adjustCount(targetCount); };
roadsInput.oninput=()=>{ roadsLbl.textContent=roadsInput.value+'%'; };
roadsInput.onchange=()=>{ roadKeepProb=+roadsInput.value/100; buildWorld(); };
blocksInput.oninput=()=>{ roadblockTarget=+blocksInput.value; blocksLbl.textContent=roadblockTarget; buildBarriers(roadblockTarget); buildBackground(); };
sceneInput.oninput=()=>{ sceneryLevel=+sceneInput.value; sceneLbl.textContent=sceneryLevel+'%'; buildBackground(); };
/* Show/hide the HUD control panel. */
function setPanel(hidden){ hud.classList.toggle('hidden',hidden); toggleBtn.style.display=hidden?'flex':'none'; }
hideBtn.onclick=()=>setPanel(true); toggleBtn.onclick=()=>setPanel(false);
window.addEventListener('keydown',e=>{ if(e.key==='h'||e.key==='H') setPanel(!hud.classList.contains('hidden')); });

/* ---- sizing ---- */
function resize(){ dpr=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
  canvas.style.width=W+'px'; canvas.style.height=H+'px'; canvas.width=Math.round(W*dpr); canvas.height=Math.round(H*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); }
let rt=null;
window.addEventListener('resize',()=>{ resize(); clearTimeout(rt); rt=setTimeout(buildWorld,180); });

resize(); buildWorld(); requestAnimationFrame(frame);
</script>
</body>
</html>
